server:
  port: 8080
  servlet:
    encoding:
      charset: utf-8
      force: true
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}/devnews
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      '[hibernate.default_batch_fetch_size]': 100
      '[hibernate.format_sql]': true

jwt:
  secret ${JWT_SECRET}